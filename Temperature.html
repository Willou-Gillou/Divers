<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique des Températures (v0.1.12)</title>
    
    <!-- Bibliothèques JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: #f4f7f6; 
            color: #333;
            overflow-x: hidden;
        }
        
        .burger-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 28px;
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            color: #2c3e50;
            z-index: 1000;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: background 0.3s;
        }
        .burger-btn:hover { background: #f0f0f0; }

        .sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 320px;
            height: 100%;
            background-color: #2c3e50;
            color: white;
            box-shadow: 4px 0 15px rgba(0,0,0,0.2);
            transition: left 0.3s ease;
            padding: 30px 25px;
            box-sizing: border-box;
            z-index: 1001;
            display: flex;
            flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar h3 {
            margin-top: 0;
            color: #ecf0f1;
            font-size: 20px;
            border-bottom: 1px solid #34495e;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            background: none;
            border: none;
            color: #bdc3c7;
            cursor: pointer;
            transition: color 0.3s;
        }
        .close-btn:hover { color: #ffffff; }
        
        .sidebar-content {
            flex-grow: 1;
            overflow-y: auto;
        }

        .form-group { 
            display: flex; 
            flex-direction: column;
            gap: 8px; 
            align-items: flex-start; 
            margin-bottom: 25px;
        }
        .sidebar label {
            font-weight: 600;
            color: #bdc3c7;
            font-size: 14px;
        }
        
        .file-label {
            display: block;
            padding: 10px 15px;
            background: #27ae60;
            color: white !important;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500 !important;
            width: 100%;
            box-sizing: border-box;
            transition: background 0.3s;
        }
        .file-label:hover { background: #2ecc71; }
        .file-label.hourly { background: #8e44ad; }
        .file-label.hourly:hover { background: #9b59b6; }
        
        .import-status {
            color: #2ecc71;
            font-size: 12px;
            display: none;
            margin-top: 5px;
        }

        .raz-btn {
            padding: 12px 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            width: 100%;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .raz-btn:hover { background: #c0392b; }
        
        .drive-btn {
            padding: 12px 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            width: 100%;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .drive-btn:hover { background: #2980b9; }

        .container { 
            max-width: 1000px; 
            margin: 60px auto 40px auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        h2 { 
            margin-top: 0; 
            color: #2c3e50;
            font-size: 24px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .version {
            font-size: 14px;
            color: #7f8c8d;
            font-weight: normal;
            background: #ecf0f1;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            background: #fdfdfd;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #ecf0f1;
        }
        .input-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: #34495e;
        }
        .input-group input {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        .update-btn {
            padding: 8px 15px;
            font-size: 13px;
            cursor: pointer;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background 0.2s;
            margin-left: auto;
        }
        .update-btn:hover { background-color: #d35400; }

        .error { 
            color: #e74c3c; 
            display: none; 
            font-weight: bold; 
            margin: 10px 0 15px 0; 
            padding: 12px;
            background-color: #fadbd8;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .chart-section {
            margin-top: 30px;
            margin-bottom: 40px;
            padding: 20px;
            border: 2px dashed transparent;
            border-radius: 12px;
            transition: border-color 0.3s;
            position: relative;
        }
        .chart-section.dragover { border-color: #3498db; background-color: rgba(52, 152, 219, 0.05); }
        .dropzone-hint {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            color: #3498db;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .chart-section.dragover .dropzone-hint { display: block; }
        
        .chart-title { font-size: 18px; color: #34495e; margin-bottom: 15px; font-weight: 600; }
        .chart-container { position: relative; height: 400px; width: 100%; }

        .source-info { 
            font-size: 12px; color: #7f8c8d; text-align: right; margin-top: 30px; 
            border-top: 1px solid #ecf0f1; padding-top: 15px;
        }
        .source-info a { color: #3498db; text-decoration: none; font-weight: 500; }
        
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; display: none; opacity: 0;
            transition: opacity 0.3s;
        }
        .overlay.active { display: block; opacity: 1; }
        
        /* DRIVE UI */
        .drive-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:8px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:9999;pointer-events:none;opacity:0;transition:opacity 0.3s;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.25);color:#fff;background:rgba(30,30,46,0.92);}
        .drive-login-overlay{position:fixed;inset:0;background:rgba(244,246,250,0.97);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;}
        .drive-login-overlay.open{display:flex;}
        .drive-loading-overlay{position:fixed;inset:0;background:rgba(244,246,250,0.97);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
        .drive-loading-overlay.open{display:flex;}
        .drive-update-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:none;align-items:center;justify-content:center;}
        .drive-update-overlay.open{display:flex;}
        .drive-update-card{width:min(94vw,420px);background:#fff;border-radius:14px;box-shadow:0 12px 32px rgba(0,0,0,0.22);padding:22px;display:flex;flex-direction:column;gap:14px;}
        @keyframes spin{to{transform:rotate(360deg)}}
        .btn{padding:9px 13px;border-radius:10px;border:1px solid #ddd;cursor:pointer;background:#f6f7fb;font-size:13px;}
        .btn-primary{background:#3498db;color:#fff;border-color:#3498db;}
    </style>
</head>
<body>
    <script>const APP_VERSION = 'v0.1.12';</script>

    <button class="burger-btn" onclick="toggleMenu()" title="Ouvrir les réglages">&#9776;</button>
    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <div id="sidebar" class="sidebar">
        <button class="close-btn" onclick="toggleMenu()" title="Fermer le menu">&times;</button>
        <h3>Paramètres</h3>
        <div class="sidebar-content">
            <div class="form-group">
                <label>Historique Piscine (Journalier) :</label>
                <label for="poolDailyFile" class="file-label">Importer CSV / XLSX</label>
                <input type="file" id="poolDailyFile" accept=".csv, .xlsx, .xls" style="display: none;" onchange="handleFileEvent(event, 'daily')">
                <div id="importStatusDaily" class="import-status">✓ Données journalières OK</div>
            </div>
            <div class="form-group">
                <label>Historique Piscine (Horaire) :</label>
                <label for="poolHourlyFile" class="file-label hourly">Ajouter CSV / XLSX</label>
                <input type="file" id="poolHourlyFile" accept=".csv, .xlsx, .xls" style="display: none;" onchange="handleFileEvent(event, 'hourly')">
                <div id="importStatusHourly" class="import-status">✓ Données horaires OK</div>
            </div>
            <div class="form-group" style="margin-top: 15px; border-top: 1px solid #34495e; padding-top: 15px; width: 100%;">
                <label style="color:#ecf0f1;">☁️ Google Drive</label>
                <div id="drawerDriveStatus" style="font-size:12px;color:#bdc3c7;margin-top:5px;margin-bottom:5px;">Non connecté</div>
                <button class="drive-btn" id="driveAuthBtn" onclick="toggleDriveAuth()">🔑 Se connecter</button>
            </div>
        </div>
        <button class="raz-btn" onclick="resetSettings()">RaZ tout effacer</button>
    </div>

    <div class="container">
        <h2>
            Historique des températures
            <span class="version" id="versionDisplay">v0.1.12</span>
        </h2>
        
        <!-- Graphique 1 -->
        <div class="chart-section" id="hourlySection">
            <div class="dropzone-hint">Relâchez le fichier Horaire ici</div>
            <div class="chart-title">Température piscine par heure</div>
            <div class="chart-container">
                <canvas id="hourlyChart"></canvas>
            </div>
        </div>
        
        <!-- Graphique 2 -->
        <div class="chart-section" id="dailySection">
            <div class="dropzone-hint">Relâchez le fichier Journalier ici</div>
            <div class="controls-row">
                <div class="input-group">
                    <label for="startDate">Date de début :</label>
                    <input type="date" id="startDate">
                </div>
                <div class="input-group">
                    <label for="cp">Ville (CP) :</label>
                    <input type="text" id="cp" placeholder="Ex: 75001" maxlength="5">
                </div>
                <button class="update-btn" onclick="chargerDonneesJournalieres()">MAJ température air</button>
            </div>
            <p id="errorMsgDaily" class="error"></p>
            <div class="chart-title">Températures journalières (Piscine & Air)</div>
            <div class="chart-container">
                <canvas id="dailyChart"></canvas>
            </div>
        </div>
        
        <div class="source-info">
            Sources : 
            <a href="https://adresse.data.gouv.fr/api-doc/adresse" target="_blank">API Adresse</a> | 
            <a href="https://open-meteo.com/" target="_blank">Open-Meteo</a>
        </div>
    </div>
    
    <!-- (Include all overlays and scripts from previous version, with updated functions) -->
    <script>
        // ... (Include drive scripts, chart logic, etc., as per previous version)
        document.getElementById('versionDisplay').textContent = APP_VERSION;
    </script>
</body>
</html>
