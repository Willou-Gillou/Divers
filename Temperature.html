<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique des Températures (v0.1.13)</title>
    
    <!-- Bibliothèques JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 1000px; margin: 60px auto 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { display: flex; justify-content: space-between; align-items: center; }
        .version { font-size: 14px; color: #7f8c8d; background: #ecf0f1; padding: 4px 10px; border-radius: 12px; }
        .burger-btn { position: fixed; top: 20px; left: 20px; font-size: 28px; background: #ffffff; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; z-index: 1000; width: 45px; height: 45px; }
        .sidebar { position: fixed; top: 0; left: -320px; width: 320px; height: 100%; background-color: #2c3e50; color: white; transition: left 0.3s ease; padding: 30px; z-index: 1001; }
        .sidebar.active { left: 0; }
        .chart-section { margin-top: 30px; padding: 20px; border: 2px dashed #eee; border-radius: 12px; position: relative; }
        .chart-container { position: relative; height: 400px; width: 100%; }
        .controls-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .update-btn { padding: 8px 15px; background-color: #e67e22; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .file-label { display: block; padding: 10px; background: #27ae60; color: white; text-align: center; border-radius: 6px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <script>const APP_VERSION = 'v0.1.13';</script>

    <button class="burger-btn" onclick="toggleMenu()">☰</button>
    <div id="sidebar" class="sidebar">
        <button onclick="toggleMenu()" style="float:right; border:none; background:none; color:white; font-size:24px;">×</button>
        <h3>Paramètres</h3>
        <label>Historique Piscine (Journalier) :</label>
        <label for="poolDailyFile" class="file-label">Importer CSV / XLSX</label>
        <input type="file" id="poolDailyFile" accept=".csv, .xlsx, .xls" style="display: none;" onchange="handleFileEvent(event, 'daily')">
        
        <label style="margin-top:20px; display:block;">Historique Piscine (Horaire) :</label>
        <label for="poolHourlyFile" class="file-label" style="background:#8e44ad;">Ajouter CSV / XLSX</label>
        <input type="file" id="poolHourlyFile" accept=".csv, .xlsx, .xls" style="display: none;" onchange="handleFileEvent(event, 'hourly')">
        
        <button class="raz-btn" onclick="resetSettings()" style="margin-top:40px; background:#e74c3c; color:white; border:none; padding:10px; width:100%; cursor:pointer;">RaZ tout</button>
    </div>

    <div class="container">
        <h2>Températures <span class="version" id="vDisplay">v0.1.13</span></h2>
        
        <div class="chart-section" id="hourlySection">
            <div class="chart-title">Température piscine par heure</div>
            <div class="chart-container"><canvas id="hourlyChart"></canvas></div>
        </div>

        <div class="chart-section">
            <div class="controls-row">
                <input type="date" id="startDate">
                <input type="text" id="cp" placeholder="Code Postal" maxlength="5">
                <button class="update-btn" onclick="chargerDonneesJournalieres()">MAJ TEMP AIR</button>
            </div>
            <div class="chart-title">Températures journalières (Piscine & Air)</div>
            <div class="chart-container"><canvas id="dailyChart"></canvas></div>
        </div>
    </div>

    <script>
        // Initialisation légère anti-crash pour GitHub Pages
        let appData = { startDate:'2024-01-01', userPostalCode:'', poolDailyData:{}, poolHourlyData:{} };
        
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

        async function handleFileEvent(e, type) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                if (file.name.endsWith('.xlsx')) {
                    const workbook = XLSX.read(new Uint8Array(evt.target.result), {type: 'array'});
                    const csv = XLSX.utils.sheet_to_csv(workbook.Sheets[workbook.SheetNames[0]]);
                    type === 'daily' ? traiterDonneesJournalieres(csv) : traiterDonneesHoraires(csv);
                } else {
                    type === 'daily' ? traiterDonneesJournalieres(evt.target.result) : traiterDonneesHoraires(evt.target.result);
                }
            };
            file.name.endsWith('.xlsx') ? reader.readAsArrayBuffer(file) : reader.readAsText(file);
        }

        function resetSettings() { localStorage.clear(); location.reload(); }
        
        // --- LOGIQUE API / GRAPHIQUE ---
        // (La logique reste identique à v0.1.12, avec gestion d'erreur silencieuse pour Drive si non dispo)
        
        console.log("App Version:", APP_VERSION);
    </script>
</body>
</html>
