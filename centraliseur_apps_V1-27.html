<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>centraliseur_apps_V1-27-SECURE.html</title>
  <style>
    :root{
      --bg1:#0b1126;--bg2:#16203c;--glass:rgba(22,30,58,.65);--line:rgba(255,255,255,.08);--text:#f5f8ff;--muted:#aab7d7;
      --blue:#7da8ff;--blue2:#4b7dff;--ok:#38d39f;--ko:#ff6d86;--wait:#ffb84d;--shadow:0 18px 42px rgba(0,0,0,.28);--radius:22px;
      --item-h:56px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;height:100dvh;overflow:hidden}
    body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 15% 0%, rgba(125,168,255,.12), transparent 28%),radial-gradient(circle at 100% 10%, rgba(56,211,159,.06), transparent 20%),linear-gradient(180deg,var(--bg1),var(--bg2));}
    .wrap{max-width:860px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;padding:14px 14px calc(14px + env(safe-area-inset-bottom));overflow:hidden;}
    .sticky{flex-shrink:0;padding-top:max(8px, env(safe-area-inset-top));margin:-14px -14px 12px;padding-left:14px;padding-right:14px}
    .sticky-inner{display:flex;justify-content:space-between;align-items:center;width:100%;gap:10px;}
    .glass{background:var(--glass);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:var(--radius)}
    .status{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:14px;background:rgba(15,20,38,.75);border:1px solid var(--line)}
    .dot{width:10px;height:10px;border-radius:999px;background:var(--wait);flex:0 0 auto;box-shadow:0 0 12px currentColor}
    .green{background:var(--ok);color:var(--ok)}.red{background:var(--ko);color:var(--ko)}.orange{background:var(--wait);color:var(--wait)}
    .status-text{font-size:12px;line-height:1.4}
    .header-badge{font-size:11px;color:#cce0ff;font-weight:600;background:rgba(125,168,255,0.12);padding:6px 10px;border-radius:10px;border:1px solid rgba(125,168,255,0.25);white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
    .hero,.panel{padding:16px;flex-shrink:0}.hero{margin-bottom:14px;padding-top:14px;padding-bottom:14px}
    h1,h2,h3,p{margin:0}h1{font-size:24px;letter-spacing:-.02em}h2{font-size:17px}h3{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:#a7d5ff}
    .version{color:#a7d5ff;font-size:12px;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}.muted{color:var(--muted);font-size:13px;line-height:1.45;margin-top:6px}
    .head{display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;flex-wrap:nowrap}.head-meta{display:flex;align-items:center;gap:10px;flex-wrap:nowrap}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;border:1px solid var(--line);font-size:12px;font-weight:600}
    .pill.connected{background:rgba(56,211,159,.15);color:var(--ok);border-color:rgba(56,211,159,.3)}
    .pill.disconnected{background:rgba(255,109,134,.15);color:var(--ko);border-color:rgba(255,109,134,.3)}
    .pill.count{background:rgba(255,255,255,.05);color:var(--text)}
    .chev{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;border:1px solid var(--line);background:rgba(17,23,42,.55);font-size:18px;font-weight:bold;transition:transform .2s ease, background .2s ease}
    .panel.collapsed .body{display:none}
    .row{display:grid;grid-template-columns:1.15fr .85fr;gap:10px}.field{display:grid;gap:6px;margin-top:12px}.field-stack{display:grid;gap:10px}.field.compact{margin-top:0}label{color:var(--muted);font-size:13px}
    input,textarea{width:100%;border:1px solid rgba(255,255,255,.08);background:rgba(8,12,24,.5);color:var(--text);outline:none;border-radius:16px;padding:12px 14px;font:inherit}
    textarea{min-height:58px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px}
    input:focus,textarea:focus{border-color:rgba(126,168,255,.8);box-shadow:0 0 0 3px rgba(126,168,255,.15)}
    .actions{display:grid;gap:10px;margin-top:14px;grid-template-columns:1fr}
    button{border:1px solid rgba(255,255,255,.08);background:rgba(17,24,46,.8);color:var(--text);font:inherit;cursor:pointer;border-radius:16px;padding:14px 14px;min-height:50px;transition:transform .15s ease,opacity .15s ease,box-shadow .15s ease,background .15s ease}
    button:hover{transform:translateY(-1px)}button:active{transform:scale(.98)}button:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .primary{background:linear-gradient(135deg, rgba(75,125,255,.95), rgba(126,168,255,.9));box-shadow:0 8px 20px rgba(75,125,255,.25);border:none}
    .ghost{background:rgba(17,24,46,.4)}
    .warn{background:rgba(86,32,43,.65); color:#ffd5de; border-color:rgba(255,109,134,.18)}
    .mini-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .mini-btn{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;padding:0;min-height:0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--blue)}
    .mini-btn.warn{color:#ffb3c0;background:rgba(255,109,134,.08);border-color:rgba(255,109,134,.18)}
    .mini-btn svg{width:18px;height:18px}
    .hint-line{margin-top:12px;color:#a7d5ff;background:none;border:0;padding:0;min-height:auto;text-align:left;font-size:13px}
    .hidden{display:none!important}

    .apps-panel{display:flex;flex-direction:column;flex:1;min-height:0;margin-bottom:0}
    .toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;flex-shrink:0}
    .toolbar-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .pill-btn{min-width:32px;height:32px;padding:0 8px;border-radius:10px;display:grid;place-items:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--blue);cursor:pointer;transition:.2s;padding:0;min-height:0;}
    .pill-btn:hover{background:rgba(255,255,255,.1)}
    .pill-btn svg{width:16px;height:16px}
    .fit{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;position:relative;margin-top:12px;padding-right:4px;scroll-behavior:auto}
    .fit::-webkit-scrollbar{width:6px}.fit::-webkit-scrollbar-track{background:transparent}.fit::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:10px}
    .list{display:grid;gap:8px;padding-bottom:12px}
    .group-label{padding:6px 4px 2px;color:#a7d5ff;font-size:12px;text-transform:uppercase;letter-spacing:.12em}
    .item-card{display:flex;flex-direction:column;align-items:stretch;gap:0;height:auto;min-height:var(--item-h);padding:0;border-radius:18px;border:1px solid rgba(255,255,255,.06);background:linear-gradient(180deg, rgba(28,38,68,.7), rgba(18,25,48,.6));box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .15s ease, opacity .15s ease, filter .15s ease, background .2s ease;width:100%;overflow:hidden}
    .item-card.open{background:linear-gradient(180deg, rgba(38,52,94,.9), rgba(24,34,64,.8));border-color: rgba(126,168,255,.2)}
    .item-main{display:flex;align-items:center;gap:10px;height:var(--item-h);width:100%;padding:6px 8px;cursor:pointer}
    .item-main:hover{background:rgba(255,255,255,.02)}
    .rank{flex:0 0 32px;width:32px;height:32px;border-radius:12px;display:grid;place-items:center;font-weight:700;font-size:12px;color:#cce0ff;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.05);transition:all .2s ease}
    .item-title-wrap{flex:1 1 0%;min-width:0;display:flex;align-items:center;gap:8px}
    .item-title{flex:0 1 auto;font-weight:600;font-size:14px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-version{flex:0 0 auto;font-size:11px;font-weight:500;color:var(--muted);background:rgba(255,255,255,.08);padding:2px 6px;border-radius:6px}
    .item-meta{font-size:10px;color:var(--wait);border:1px solid rgba(255,184,77,.4);padding:2px 4px;border-radius:4px;white-space:nowrap}
    .item-actions{display:none;align-items:center;gap:8px;padding:2px 8px 12px 46px;flex-wrap:wrap;width:100%}
    .item-card.open .item-actions{display:flex}
    .action-btn{flex:0 0 36px;width:36px;height:36px;display:grid;place-items:center;color:var(--blue);cursor:pointer;border-radius:10px;transition:background .2s, color .2s;background:rgba(125,168,255,0.08);border:1px solid rgba(125,168,255,0.1);padding:0;min-height:0}
    .action-btn:active{background:rgba(255,255,255,.1)}
    .action-btn svg{width:18px;height:18px}.action-btn:hover{background:rgba(125,168,255,0.15)}
    .action-btn.warn{color:#ffb3c0;background:rgba(255,109,134,.08);border-color:rgba(255,109,134,.18)}
    .grow-url{flex:1 1 260px;min-width:220px;color:#d8e6ff;background:rgba(8,12,24,.35);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px 12px;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .empty{color:var(--muted);margin-top:14px;padding:14px;border:1px dashed var(--line);border-radius:16px;background:rgba(13,19,36,.42)}

    @media (max-width:640px){
      .wrap{padding:12px 12px calc(12px + env(safe-area-inset-bottom))}
      .sticky{margin:-12px -12px 8px;padding-left:12px;padding-right:12px}
      .panel{padding:12px}
      .item-main{gap:4px;height:54px;padding:5px 6px}.rank{flex:0 0 24px;width:24px;height:24px;font-size:10px}
      .item-title-wrap{gap:6px}.item-title{font-size:13px}
      .item-version{font-size:10px;padding:1px 4px}.action-btn{flex:0 0 32px;width:32px;height:32px}.action-btn svg{width:16px;height:16px}
      .pill-btn{width:28px;height:28px}.pill-btn svg{width:14px;height:14px}.status-text{font-size:11px}.header-badge{font-size:10px;padding:4px 8px}
      .item-actions{padding:0 6px 10px 34px; gap:6px}.row{grid-template-columns:1fr}
    }
  
.version-input{width:48px;font-size:11px;text-align:center;background:rgba(125,168,255,.1);border:1px solid rgba(125,168,255,.3);border-radius:8px;padding:2px 4px;color:var(--blue);font-weight:500;font-family:ui-monospace}
.version-input:focus{outline:none;box-shadow:0 0 0 2px rgba(125,168,255,.3)}
#copyUrlBtn:hover{opacity:1!important;background:rgba(125,168,255,.15)!important}
</style>
</head>
<body>
  <div class="wrap" id="mainWrap">
    <div class="sticky">
      <div class="sticky-inner">
        <div class="status glass"><span id="statusDot" class="dot orange"></span><div id="statusText" class="status-text">En attente.</div></div>
        <div class="header-badge">V1-27</div>
      </div>
    </div>

    <section class="hero glass"><div style="display:flex;align-items:center;justify-content:center;gap:10px">
  <h1>Centraliseur Apps</h1>
  <button id="copyUrlBtn" title="Copier l'URL du centraliseur" style="background:none;border:none;cursor:pointer;padding:4px;color:var(--blue);opacity:.7;flex-shrink:0;min-height:0;width:28px;height:28px;display:grid;place-items:center;border-radius:8px;transition:opacity .2s,background .2s">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
      <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
    </svg>
  </button>
</div></section>

    <section id="sourcesPanel" class="panel glass">
      <div id="sourcesHead" class="head">
        <div style="display:flex; align-items:center;"><h2>Sources</h2></div>
        <div class="head-meta"><div id="sourcesStatePill" class="pill disconnected">À configurer</div><div id="sourcesChev" class="chev">-</div></div>
      </div>
      <div class="body" id="sourcesBody">
        <div class="row">
          <div class="field-stack">
            <div class="field compact"><label for="koyebUrls">URLs Koyeb publiques</label><textarea id="koyebUrls" placeholder="https://mon-app.koyeb.app&#10;https://autre-app.koyeb.app"></textarea></div>
            <div class="field compact"><label for="koyebToken">Koyeb API token</label><input id="koyebToken" type="password" placeholder=""></div>
            <div class="field compact"><label for="koyebProxyUrl">Koyeb proxy URL</label><input id="koyebProxyUrl" type="text" placeholder="/api/koyeb/apps"></div>
            <div class="field compact"><label for="githubProfiles">GitHub profils</label><textarea id="githubProfiles" placeholder=""></textarea></div>
            <div class="field compact"><label for="githubToken">GitHub token optionnel</label><input id="githubToken" type="password" placeholder=""></div>
          </div>
          <div class="field-stack">
            <div class="field compact"><label for="hfProfiles">Hugging Face profils</label><textarea id="hfProfiles" placeholder=""></textarea></div>
          </div>
        </div>
        <div class="actions">
          <button id="scanBtn" class="primary" type="button">Scanner & Charger</button>
          <button id="saveBtn" class="ghost" type="button">Sauvegarder profils</button>
          <button id="clearDataBtn" class="ghost" type="button">RaZ donnée app</button>
          <button id="clearBtn" class="warn" type="button">Effacer profils</button>
        </div>
        <button id="debugToggle" class="hint-line" type="button">Afficher debug</button>
        <div id="debugWrap" class="field hidden"><textarea id="debugBox" readonly placeholder="Logs de scan"></textarea></div>
      </div>
    </section>

    <section id="appsCard" class="panel glass apps-panel">
      <div class="toolbar">
        <h2>Mes apps</h2>
        <div class="toolbar-actions">
<button id="btnRescanGithub" class="pill-btn" title="Rescanner GitHub">GH</button>
<button id="btnRescanHf" class="pill-btn" title="Rescanner Hugging Face">HF</button>
<button id="btnRescanKoyeb" class="pill-btn" title="Rescanner Koyeb">KY</button>

          <button id="btnRescan" class="pill-btn" title="Rescanner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg></button><button id="btnRefreshVersions" class="pill-btn warn" title="Actualiser versions"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></button>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
          </button>
          <button id="btnCollapseAll" class="pill-btn" title="Tout réduire">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
          </button>
          <button id="btnScrollTop" class="pill-btn" title="Haut de page">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 11 12 6 7 11"></polyline><line x1="12" y1="18" x2="12" y2="6"></line><line x1="4" y1="3" x2="20" y2="3"></line></svg>
          </button>
          <div class="pill count"><span id="countLabel">0 app</span></div>
        </div>
      </div>
      <div id="fitWrap" class="fit">
        <div id="appsList" class="list"></div>
      </div>
      <div id="emptyState" class="empty hidden">Aucune application trouvée.</div>
    </section>
  </div>

  <script>
    const APP_VERSION = 'V1-27';
    const PROFILE_STORAGE_KEY = 'centraliseur-apps-profiles';
    const DATA_STORAGE_KEY = 'centraliseur-apps-data';
    const UI_STORAGE_KEY = 'centraliseur-apps-ui';
    const svgWake = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"></path></svg>';
    const svgOpen = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>';
    const svgCopy = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';

    const state = {
      githubProfiles: [], hfProfiles: [], githubApps: [], hfApps: [], koyebApps: [], githubToken: '', koyebUrls: '', koyebToken: '', koyebProxyUrl: '/api/koyeb/apps',
      debugOpen: false, sourcesCollapsed: false, expandedItems: {}
    };

    const el = {
      githubProfiles: document.getElementById('githubProfiles'),
      hfProfiles: document.getElementById('hfProfiles'),
      githubToken: document.getElementById('githubToken'),
      koyebUrls: document.getElementById('koyebUrls'),
      koyebToken: document.getElementById('koyebToken'),
      koyebProxyUrl: document.getElementById('koyebProxyUrl'),
      scanBtn: document.getElementById('scanBtn'),
      saveBtn: document.getElementById('saveBtn'),
      clearBtn: document.getElementById('clearBtn'),
      clearDataBtn: document.getElementById('clearDataBtn'),
      statusDot: document.getElementById('statusDot'),
      statusText: document.getElementById('statusText'),
      sourcesPanel: document.getElementById('sourcesPanel'),
      sourcesHead: document.getElementById('sourcesHead'),
      sourcesChev: document.getElementById('sourcesChev'),
      sourcesStatePill: document.getElementById('sourcesStatePill'),
      debugToggle: document.getElementById('debugToggle'),
      debugWrap: document.getElementById('debugWrap'),
      debugBox: document.getElementById('debugBox'),
      appsList: document.getElementById('appsList'),
      emptyState: document.getElementById('emptyState'),
      countLabel: document.getElementById('countLabel'),
      btnRescan: document.getElementById('btnRescan'),
      btnRescanGithub: document.getElementById('btnRescanGithub'),
      btnRescanHf: document.getElementById('btnRescanHf'),
      btnRescanKoyeb: document.getElementById('btnRescanKoyeb'),
      btnCollapseAll: document.getElementById('btnCollapseAll'),
      btnScrollTop: document.getElementById('btnScrollTop'),
      fitWrap: document.getElementById('fitWrap'),
    };

    init();

    
function loadLegacyProfilesAnyVersion(){
  try{
    const prefixes = ['centraliseur-apps-profiles'];
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(!k) continue;
      if(prefixes.some(p => k.startsWith(p))){
        const raw = localStorage.getItem(k);
        if(!raw) continue;
        const data = JSON.parse(raw);
        if(data && (data.koyebUrls || data.githubProfiles || data.hfProfiles)) return data;
      }
    }
  }catch(e){}
  return null;
}
function mergeProfilesFromStorage(data){
  if(!data || typeof data !== 'object') return;
  if(Array.isArray(data.githubProfiles)) state.githubProfiles = data.githubProfiles;
  if(Array.isArray(data.hfProfiles)) state.hfProfiles = data.hfProfiles;
  if(typeof data.githubToken === 'string') state.githubToken = data.githubToken;
  if(typeof data.koyebUrls === 'string') state.koyebUrls = data.koyebUrls;
  if(typeof data.koyebToken === 'string') state.koyebToken = data.koyebToken;
  if(typeof data.koyebProxyUrl === 'string') state.koyebProxyUrl = data.koyebProxyUrl;
}

function init(){

  document.getElementById('copyUrlBtn').addEventListener('click', function(){
    const url = window.location.href;
    navigator.clipboard.writeText(url).then(()=>{
      setStatus('green', '📋 URL copiée !');
      setTimeout(()=>setStatus('orange', 'Prêt.'), 2000);
    }).catch(()=>{
      prompt('URL du centraliseur :', url);
    });
  });

      loadProfiles();
      loadAppData();
      loadUi();
      bind();
      hydrate();
      renderDebug();
      renderSourcesPanel();
      renderList();
      setStatus('orange', 'Prêt.');
    }

    function bind(){
      el.scanBtn.addEventListener('click', scanAll);
      el.saveBtn.addEventListener('click', saveProfiles);
      el.clearBtn.addEventListener('click', clearProfiles);
      el.clearDataBtn.addEventListener('click', clearAppData);
      el.btnRescan.addEventListener('click', scanAll);
      el.btnRescanGithub?.addEventListener('click', scanGithubOnly);
      el.btnRescanHf?.addEventListener('click', scanHfOnly);
      el.btnRescanKoyeb?.addEventListener('click', scanKoyebOnly);
      el.btnCollapseAll.addEventListener('click', () => { state.expandedItems = {}; saveUi(); renderList(); });
      el.btnScrollTop.addEventListener('click', () => { el.fitWrap.scrollTo({ top:0, behavior:'smooth' }); window.scrollTo({ top:0, behavior:'smooth' }); });
      el.sourcesHead.addEventListener('click', function(e){ e.stopPropagation(); if(e.target.closest('button') || e.target.tagName==='INPUT' || e.target.tagName==='TEXTAREA') return; state.sourcesCollapsed = !state.sourcesCollapsed; renderSourcesPanel(); saveUi(); });
      el.debugToggle.addEventListener('click', function(){ state.debugOpen = !state.debugOpen; renderDebug(); saveUi(); });
      [el.githubProfiles, el.hfProfiles, el.githubToken, el.koyebUrls, el.koyebToken, el.koyebProxyUrl].forEach(inp => { inp.addEventListener('change', saveProfiles); inp.addEventListener('input', saveProfiles); });
      el.appsList.addEventListener('click', onListClick);
    }

    function onListClick(e){
      const actionEl = e.target.closest('[data-action]');
      const key = actionEl?.dataset.key || e.target.closest('.item-main')?.dataset.key;
      if(!key) return;
      if(actionEl){
        e.stopPropagation();
        handleRowAction(actionEl.dataset.action, key);
        return;
      }
      toggleItem(key);
    }

async function fetchHfLatestCommitMessage(spaceId){
  try{
    const url = `https://huggingface.co/spaces/${spaceId}/commits/main`;
    const res = await fetch(url, { cache:'no-store' });
    if(!res.ok) return null;
    const html = await res.text();
    const patterns = [
      /commit-title[^>]*>([^<]{3,120})</i,
      /TimelineItem-body[^>]*>([^<]{3,120})</i,
      /<title>Commits · ([^<]+)<\/title>/i
    ];
    for(const rx of patterns){
      const m = html.match(rx);
      if(m?.[1]) return String(m[1]).trim();
    }
  }catch(e){}
  return null;
}

    function koyebStatusToBool(value){
      const v = String(value || '').toLowerCase();

    async function listKoyebApps(){
      const token = (el.koyebToken.value || '').trim();
      const proxyUrl = (el.koyebProxyUrl.value || '').trim();
      if(!token) throw new Error('Token Koyeb manquant');
      if(!proxyUrl) throw new Error('Proxy Koyeb manquant');
      const res = await fetch(proxyUrl, {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Accept':'application/json' },
        body: JSON.stringify({ provider:'koyeb', token })
      });
      if(!res.ok){
        let details='';
        try{ details = await res.text(); }catch{}
        throw new Error(`Proxy HTTP ${res.status}${details ? ' - ' + details.slice(0, 240) : ''}`);
      }
      const data = await res.json();
      if(Array.isArray(data?.apps)) return data.apps;
      if(Array.isArray(data?.items)) return data.items;
      if(Array.isArray(data)) return data;
      if(Array.isArray(data?.data)) return data.data;

    async function scanKoyeb(){

      if(el.koyebToken.value.trim()){
        try{
          const apps = await listKoyebApps();
          const rows = [];
          for(const app of apps){
            const link = koyebAppLink(app);
            if(!link) continue;
            const status = koyebStatusToBool(app?.status);
            rows.push({
              key:`koyeb::${link}`,
              source:'koyeb',
              owner:'koyeb',
              ownerLabel:'Koyeb',
              name:String(app?.name || link.replace(/^https?:\/\//,'')),

async function scanGithubOnly(){

      const result = await scanGitHubOwner(owner);
      githubApps.push(...result.rows);

        setStatus('orange', 'Scan Koyeb via proxy...');
        try{ const rows = await scanKoyeb(); koyebApps.push(...rows); state.koyebApps = sortRows(dedupeRows(koyebApps)); renderList(); if(!rows.length) setStatus('orange', 'Koyeb via proxy : aucune app publique détectée.'); }
        catch(e){ console.error(e); errors.push('Koyeb'); const msg = String(e.message || 'Erreur inconnue'); if(msg.includes('401')) setStatus('red', 'Koyeb proxy : token invalide ou expiré.'); else if(msg.includes('403')) setStatus('red', 'Koyeb proxy : accès refusé.'); else if(msg.includes('Proxy')) setStatus('red', 'Koyeb : proxy indisponible ou mal configuré.'); else setStatus('red', 'Koyeb : erreur proxy/API.'); logDebug(`Erreur Koyeb: ${msg}`); }
      }
      state.githubApps=sortRows(dedupeRows(githubApps)); state.hfApps=sortRows(dedupeRows(hfApps)); state.koyebApps=sortRows(dedupeRows(koyebApps));
      saveAppData(); saveUi(); renderList();
      if(state.githubApps.length + state.hfApps.length + state.koyebApps.length) { state.sourcesCollapsed = true; renderSourcesPanel(); saveUi(); }
      if(errors.length) setStatus('orange', `Scan terminé avec erreurs partielles.`); else setStatus('green', 'Apps synchronisées avec succès.');
      logDebug({ github: state.githubApps.length, huggingFace: state.hfApps.length, koyeb: state.koyebApps.length, errors });
    }

    
    async function refreshVersions(){
      setStatus('orange', 'Actualisation des versions en cours...');
      const rows = getAllRows();
      const promises = rows.map(async (row) => {
        if(row.source === 'github'){
          try{
            const found = await detectLiveAppVersion(row);
            if(found){
              row.appVersion = found;
              logDebug(`✅ ${row.name}: ${found}`);
            }
          }catch(e){
            logDebug(`❌ ${row.name}: ${e.message}`);
          }
        }
      });
      await Promise.allSettled(promises);
      saveAppData();
      renderList();
      setStatus('green', 'Versions actualisées');
    }


async function detectGitHubPageVersion(owner, repoName, filePath, branch){
  try{
    logDebug(`📄 Checking ${owner}/${repoName}/${filePath}`);
    const contentInfo = await fetchJsonSafe(`https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repoName)}/contents/${encodeURIComponent(filePath)}?ref=${encodeURIComponent(branch)}`, { headers: getGitHubHeaders() });
    if(contentInfo?.content){
      const text = decodeBase64Unicode(contentInfo.content);
      const found = extractVersionFromText(filePath, text);
      logDebug(`✅ Found version ${found} in ${filePath}`);
      return found;
    }
  }catch(e){
    logDebug(`❌ ${filePath}: ${e.message}`);
  }
  return null;
}

function getAllRows(){ return [...state.githubApps, ...state.hfApps, ...state.koyebApps]; }
    function getRowByKey(key){ return getAllRows().find(row => rowKey(row) === key) || null; }
    function countLabel(n){ return `${n} app${n > 1 ? 's' : ''}`; }
    function statusMeta(row){ if(row.status === true) return 'up'; if(row.status === false) return 'down'; return 'wait'; }
    function statusDotClass(row){ if(row.status === true) return 'green'; if(row.status === false) return 'red'; return 'orange'; }
    function detailText(row){ return row.source === 'github' ? (row.pagePath || 'index.html') : (row.sourceInfo || row.ownerLabel || ''); }

    function normalizeVersionString(value){
      const raw = String(value || '').trim();
      if(!raw) return '';
      const match = raw.match(/v?\d+(?:\.\d+){0,4}(?:[-._a-zA-Z0-9]+)?/);
      return match ? match[0] : raw.slice(0, 24);
    }
    function parseVersionFromJson(data){
      if(!data || typeof data !== 'object') return '';
      const candidates = [
        data.version, data.appVersion, data.app_version,
        data?.manifest?.version, data?.meta?.version,
        data?.package?.version
      ].filter(Boolean);
      for(const value of candidates){
        const normalized = normalizeVersionString(value);
        if(normalized) return normalized;
      }
      return '';
    }
    function parseVersionFromText(text){
      const content = String(text || '');
      if(!content) return '';
      const patterns = [
        /"version"\s*:\s*"([^"]+)"/i,
        /"appVersion"\s*:\s*"([^"]+)"/i,
        /"app_version"\s*:\s*"([^"]+)"/i,
        /\bversion\b\s*[:=]\s*["']?([A-Za-z0-9._-]+)/i,
        /\bapp[-_ ]?version\b\s*[:=]\s*["']?([A-Za-z0-9._-]+)/i,
        /<meta[^>]+name=["'](?:app-version|version)["'][^>]+content=["']([^"']+)["']/i,
        /data-app-version=["']([^"']+)["']/i
      ];
      for(const rx of patterns){
        const match = content.match(rx);
        const normalized = normalizeVersionString(match?.[1] || '');
        if(normalized) return normalized;
      }
      return '';
    }
    async function tryFetchVersionCandidate(url){
      try{
        const res = await fetch(url, { cache:'no-store' });
        if(!res.ok) return '';
        const type = String(res.headers.get('content-type') || '').toLowerCase();
        if(type.includes('application/json')){
          const data = await res.json();
          return parseVersionFromJson(data);
        }
        const text = await res.text();
        if(url.endsWith('.json')){
          try{ return parseVersionFromJson(JSON.parse(text)); }catch{}
        }
        return parseVersionFromText(text);
      }catch{
        return '';
      }
    }
    function buildVersionCandidates(link){
      const out = [];
      try{
        const url = new URL(link);
        const pathname = url.pathname || '/';
        const base = pathname.endsWith('.html') ? pathname.replace(/[^/]+$/, '') : (pathname.endsWith('/') ? pathname : pathname + '/');
        const push = (path) => { try{ out.push(new URL(path, url.origin + base).toString()); }catch{} };
        push('version.txt');
        push('manifest.json');
        push('package.json');
        push('meta.json');
        out.push(url.toString());
      }catch{}
      return [...new Set(out)];
    }
    async function detectLiveAppVersion(row){
      const candidates = buildVersionCandidates(row.link);
      for(const candidate of candidates){
        const found = await tryFetchVersionCandidate(candidate);
        if(found) return found;
      }
      return '';
    }
    async function refreshVersionForRow(key, announce){
      const row = getRowByKey(key);
      if(!row) return;
      if(announce) setStatus('orange', 'Lecture de version en cours...');
      const found = await detectLiveAppVersion(row);
      if(found){
        row.appVersion = found;
        saveAppData();
        renderList();
        setStatus('green', 'Version app détectée.');
      }else if(announce){
        setStatus('orange', 'Version app non détectée, version dépôt conservée.');
      }
    }

    function renderGroup(title, rows, offset){
      if(!rows.length) return '';
      return `<div class="group-label">${escapeHtml(title)}</div>` + rows.map((row, idx) => {
        const key=rowKey(row); const open=isExpanded(key);
        return `<article class="item-card ${open ? 'open' : ''}" data-card-key="${escapeHtml(key)}">
          <div class="item-main" data-key="${escapeHtml(key)}">
            <div class="rank"><span class="dot ${statusDotClass(row)}"></span></div>
            <div class="item-title-wrap">
              <div class="item-title">${escapeHtml(row.name)}${row.source === 'github' && row.pagePath ? ' <span style="opacity:.55;font-size:11px;font-weight:400">/ ' + escapeHtml(row.pagePath) + '</span>' : ''}</div>
              <div class="item-version">${escapeHtml(row.appVersion || row.version || '—')}</div>
            </div>
            <button class="action-btn" data-action="open" data-key="${escapeHtml(key)}" title="Ouvrir le lien">${svgOpen}</button>
          </div>
          <div class="item-actions">
            <button class="action-btn" data-action="copy" data-key="${escapeHtml(key)}" title="Copier URL live">${svgCopy}</button>
            <button class="action-btn" data-action="wake" data-key="${escapeHtml(key)}" title="Wake up">${svgWake}</button>
            <div class="grow-url">${escapeHtml(row.link)}</div>
            <div class="item-meta">${escapeHtml(detailText(row))}</div>
            <div class="item-meta">${escapeHtml(formatDate(row.updatedAt))}</div>
          </div>
        </article>`;
      }).join('');
    }

    function renderList(){
      const gh = state.githubApps; const hf = state.hfApps; const ky = state.koyebApps; const total = gh.length + hf.length + ky.length;
      el.countLabel.textContent = countLabel(total);
      el.emptyState.classList.toggle('hidden', total > 0);
      el.fitWrap.classList.toggle('hidden', total === 0);
      if(!total){ el.appsList.innerHTML = ''; return; }
      el.appsList.innerHTML = renderGroup('GitHub Pages', gh, 0) + renderGroup('Hugging Face', hf, gh.length) + renderGroup('Koyeb', ky, gh.length + hf.length);
    }

    async function handleRowAction(action, key){
      const row=getRowByKey(key); if(!row) return;
      if(action==='toggle'){ toggleItem(key); return; }
      if(action==='collapse'){ delete state.expandedItems[key]; saveUi(); renderList(); return; }
      if(action==='open'){ window.open(row.link, '_blank', 'noopener'); refreshVersionForRow(key, true); return; }
      if(action==='wake'){
        setStatus('orange', 'Réveil du serveur en cours...');
        try{
          await fetch(row.link, { method:'GET', mode:'no-cors', cache:'no-store' });
          setStatus('green', 'Tentative de réveil envoyée.');
        }catch{
          setStatus('orange', 'Wake up envoyé, réponse non confirmée.');
        }
        refreshVersionForRow(key, false);
        return;
      }
      if(action==='copy'){ try{ await navigator.clipboard.writeText(row.link); setStatus('green', 'Lien copié.'); }catch{ setStatus('red', 'Copie impossible sur ce navigateur.'); } }
    }
  </script>
